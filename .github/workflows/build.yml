name: build-cloudflared-android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone cloudflared
        run: |
          git clone https://github.com/cloudflare/cloudflared.git
          cd cloudflared

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

- name: Build for Linux ARM32 (Termux可用)
  run: |
    cd cloudflared/cmd/cloudflared
    GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -o cloudflared-linux-arm

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-android-arm
          path: cloudflared/cmd/cloudflared/cloudflared-android-arm
