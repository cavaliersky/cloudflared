name: build-cloudflared-arm32

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取你自己的仓库（必须）
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ 拉 cloudflared 源码
      - name: Clone cloudflared
        run: |
          git clone https://github.com/cloudflare/cloudflared.git

      # 3️⃣ 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      # 4️⃣ 编译 Linux ARM32（关键）
      - name: Build cloudflared (linux arm32)
        run: |
          cd cloudflared/cmd/cloudflared
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -o cloudflared-linux-arm

      # 5️⃣ 看看编译结果（调试用）
      - name: List output
        run: |
          ls -lh cloudflared/cmd/cloudflared

      # 6️⃣ 上传文件（你下载用）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-linux-arm
          path: cloudflared/cmd/cloudflared/cloudflared-linux-arm
